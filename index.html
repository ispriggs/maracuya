<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Shop Task Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #8a9e85;
    --sage-light: #c5d4c2;
    --sage-dark: #5c7057;
    --terracotta: #c27b5a;
    --terracotta-light: #e8c4ae;
    --sand: #f5f0e8;
    --deep: #2c2c2c;
    --muted: #7a7a7a;
    --white: #ffffff;
    --card-bg: rgba(255,255,255,0.75);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(138,158,133,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(194,123,90,0.12) 0%, transparent 50%);
    min-height: 100vh;
    padding: 40px 20px 80px;
    color: var(--deep);
  }

  header {
    text-align: center;
    margin-bottom: 52px;
  }

  header .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--terracotta);
    font-weight: 500;
    margin-bottom: 10px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 600;
    color: var(--deep);
    line-height: 1.15;
  }

  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  .progress-bar-wrap {
    width: 220px;
    height: 4px;
    background: var(--sage-light);
    border-radius: 10px;
    margin: 18px auto 0;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage-dark), var(--terracotta));
    border-radius: 10px;
    transition: width 0.5s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 28px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .person-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 32px 28px 28px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.9);
    box-shadow: 0 4px 24px rgba(92,112,87,0.08), 0 1px 4px rgba(0,0,0,0.04);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .person-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(92,112,87,0.13), 0 2px 8px rgba(0,0,0,0.06);
  }

  .person-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 6px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .p1 .avatar { background: rgba(138,158,133,0.25); }
  .p2 .avatar { background: rgba(194,123,90,0.2); }
  .p3 .avatar { background: rgba(92,112,87,0.18); }

  .person-meta h2 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.2;
  }

  .person-meta .role {
    font-size: 11.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .person-progress {
    margin: 16px 0 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mini-bar {
    flex: 1;
    height: 5px;
    background: #e8e2d8;
    border-radius: 10px;
    overflow: hidden;
  }
  .mini-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .p1 .mini-fill { background: linear-gradient(90deg, var(--sage), var(--sage-dark)); }
  .p2 .mini-fill { background: linear-gradient(90deg, var(--terracotta-light), var(--terracotta)); }
  .p3 .mini-fill { background: linear-gradient(90deg, #a2b59e, var(--sage-dark)); }

  .mini-pct {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    min-width: 36px;
    text-align: right;
  }

  .section {
    margin-bottom: 22px;
  }

  .section-title {
    font-size: 10.5px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--terracotta);
    font-weight: 500;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(194,123,90,0.2);
  }

  .p2 .section-title { color: var(--sage-dark); border-color: rgba(138,158,133,0.3); }
  .p3 .section-title { color: #6b7c68; border-color: rgba(107,124,104,0.25); }

  .task-group {
    margin-bottom: 14px;
  }

  .task-group-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--deep);
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .task-group-name::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--sage-light);
    flex-shrink: 0;
  }

  .p2 .task-group-name::before { background: var(--terracotta-light); }
  .p3 .task-group-name::before { background: #b5c8b2; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease;
    margin-bottom: 3px;
    user-select: none;
  }

  .task-item:hover { background: rgba(138,158,133,0.08); }

  .task-item input[type="checkbox"] { display: none; }

  .custom-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--sage-light);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    background: white;
  }

  .p2 .custom-check { border-color: var(--terracotta-light); }
  .p3 .custom-check { border-color: #b5c8b2; }

  .task-item.done .custom-check {
    background: var(--sage);
    border-color: var(--sage);
  }
  .p2 .task-item.done .custom-check {
    background: var(--terracotta);
    border-color: var(--terracotta);
  }
  .p3 .task-item.done .custom-check {
    background: var(--sage-dark);
    border-color: var(--sage-dark);
  }

  .custom-check svg {
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.18s ease;
  }
  .task-item.done .custom-check svg {
    opacity: 1;
    transform: scale(1);
  }

  .task-label {
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--deep);
    transition: color 0.2s, text-decoration 0.2s;
  }

  .task-item.done .task-label {
    color: var(--muted);
    text-decoration: line-through;
  }

  .deliverables-section {
    background: rgba(138,158,133,0.07);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 6px;
  }

  .p2 .deliverables-section { background: rgba(194,123,90,0.06); }
  .p3 .deliverables-section { background: rgba(92,112,87,0.07); }

  .reset-btn {
    display: block;
    margin: 10px auto 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid #d8d2c8;
    border-radius: 20px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }


  /* ── HAMBURGER & DRAWER ── */
 .hamburger {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 1000;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: rgba(245,240,232,0.7);
  border: 1px solid rgba(138,158,133,0.15);
  backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: background 0.2s;
}
.hamburger:hover { background: rgba(245,240,232,0.95); }
.hamburger span {
  display: block;
  width: 15px;
  height: 1.5px;
  background: var(--deep);
  border-radius: 2px;
  transition: all 0.3s ease;
  transform-origin: center;
}
.hamburger.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

.back-to-top {
  position: fixed;
  bottom: 24px;
  right: 20px;
  z-index: 1000;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: rgba(245,240,232,0.7);
  border: 1px solid rgba(138,158,133,0.15);
  backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, background 0.2s;
}
.back-to-top.visible { opacity: 1; pointer-events: all; }
.back-to-top:hover { background: rgba(245,240,232,0.95); }
.back-to-top svg { width: 14px; height: 14px; stroke: var(--deep); }

  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,44,44,0.3);
    backdrop-filter: blur(3px);
    z-index: 900;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  .drawer {
    position: fixed;
    top: 0; left: 0;
    height: 100%;
    width: 280px;
    background: white;
    z-index: 950;
    padding: 80px 32px 40px;
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 4px 0 40px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--deep); margin-bottom: 6px; }
  .drawer-tagline { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 40px; }
  .drawer-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-bottom: 14px; }
  .drawer-nav { display: flex; flex-direction: column; gap: 8px; }
  .drawer-link {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: 12px;
    text-decoration: none; color: var(--deep);
    transition: background 0.15s, transform 0.15s;
    border: 1px solid transparent;
  }
  .drawer-link:hover { background: var(--sand); border-color: rgba(138,158,133,0.2); transform: translateX(3px); }
  .drawer-link.active { background: rgba(138,158,133,0.12); border-color: rgba(138,158,133,0.3); }
  .drawer-link-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .link-eshop .drawer-link-icon { background: rgba(138,158,133,0.15); }
  .link-vivi .drawer-link-icon { background: rgba(194,123,90,0.12); }
  .drawer-link-text { font-size: 14px; font-weight: 500; }
  .drawer-link-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .drawer-footer { margin-top: auto; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

</style>
</head>

// ── SUPABASE CONFIG ──────────────────────────────────────────
const SUPABASE_URL = 'https://uewamqxapuoqcwedgkdt.supabase.co';       // e.g. https://xxxx.supabase.co
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVld2FtcXhhcHVvcWN3ZWRna2R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Njg2MjEsImV4cCI6MjA4ODI0NDYyMX0.r9Do0jX5aDbS62wyddwfW0XUHbv7WzeSYdOW014U1hk';
// ─────────────────────────────────────────────────────────────

let state = {};
let allTaskIds = [];
let saving = false;

async function loadFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/task_state?select=id,done`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    const rows = await res.json();
    if (Array.isArray(rows)) {
      rows.forEach(r => { state[r.id] = r.done; });
    }
  } catch (e) {
    console.warn('Supabase load failed, using local state.', e);
  }
}

async function saveToSupabase(id, done) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/task_state`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id, done, updated_at: new Date().toISOString() })
    });
  } catch (e) {
    console.warn('Supabase save failed.', e);
  }
}

async function resetPersonInSupabase(personName) {
  const prefix = slugify(personName);
  const ids = Object.keys(state).filter(k => k.startsWith(prefix));
  await Promise.all(ids.map(id => saveToSupabase(id, false)));
}

function slugify(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .substring(0, 60);
}

function taskId(personName, groupName, taskText) {
  return `${slugify(personName)}__${slugify(groupName || 'deliverable')}__${slugify(taskText)}`;
}

function renderAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  people.forEach(person => {
    const card = document.createElement('div');
    card.className = `person-card ${person.id}`;

    let personTaskIds = [];
    let sectionHtml = '';

    person.sections.forEach((section, si) => {
      let groupsHtml = '';
      section.groups.forEach((group, gi) => {
        let tasksHtml = '';
        group.tasks.forEach((task, ti) => {
          const id = taskId(person.name, group.name, task);
          personTaskIds.push(id);
          allTaskIds.push(id);
          const done = state[id] ? 'done' : '';
          tasksHtml += `
            <div class="task-item ${done}" data-id="${id}" onclick="toggleTask('${id}')">
              <span class="custom-check">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                  <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="task-label">${task}</span>
            </div>`;
        });

        const groupNameHtml = group.name
          ? `<div class="task-group-name">${group.name}</div>`
          : '';

        groupsHtml += `<div class="task-group">${groupNameHtml}${tasksHtml}</div>`;
      });

      const isDeliverable = section.title.toLowerCase().includes('deliverable');
      const wrapClass = isDeliverable ? 'deliverables-section' : '';

      sectionHtml += `
        <div class="section">
          <div class="section-title">${section.title}</div>
          <div class="${wrapClass}">${groupsHtml}</div>
        </div>`;
    });

    const doneCount = personTaskIds.filter(id => state[id]).length;
    const pct = personTaskIds.length ? Math.round(doneCount / personTaskIds.length * 100) : 0;

    card.innerHTML = `
      <div class="person-header">
        <div class="avatar">${person.emoji}</div>
        <div class="person-meta">
          <h2>${person.name}</h2>
          <div class="role">${person.role}</div>
        </div>
      </div>
      <div class="person-progress">
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        <div class="mini-pct">${pct}%</div>
      </div>
      ${sectionHtml}
      <button class="reset-btn" data-person="${person.name}">Reset</button>
    `;

    grid.appendChild(card);
  });

  updateGlobal();
  attachListeners();
}

function updateGlobal() {
  const total = allTaskIds.length;
  const done = allTaskIds.filter(id => state[id]).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('globalFill').style.width = pct + '%';
  document.getElementById('globalLabel').textContent = `${done} of ${total} tasks complete`;
}

async function toggleTask(id) {
  state[id] = !state[id];
  allTaskIds = [];
  renderAll();
  await saveToSupabase(id, state[id]);
}

function attachListeners() {
  document.querySelectorAll('.reset-btn').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const personName = btn.dataset.person;
      await resetPersonInSupabase(personName);
      const prefix = slugify(personName);
      Object.keys(state).forEach(k => { if (k.startsWith(prefix)) delete state[k]; });
      allTaskIds = [];
      renderAll();
    });
  });
}

// Init — load from Supabase then render
(async () => {
  document.getElementById('globalLabel').textContent = 'Loading…';
  await loadFromSupabase();
  renderAll();
})();

function toggleDrawer() {
  const hamburger = document.getElementById('hamburger');
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('drawerOverlay');
  hamburger.classList.toggle('open');
  drawer.classList.toggle('open');
  overlay.classList.toggle('open');
}

  window.addEventListener('scroll', () => {
  document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 300);
});
  
</script>
</body>
</html>
